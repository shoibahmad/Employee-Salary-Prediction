services:
  # Monolith Service (Backend + Frontend)
  - type: web
    name: salary-prediction-app
    env: python
    plan: free
    region: oregon 
    buildCommand: bash build.sh
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: NODE_VERSION
        value: 18.0.0
      - key: REACT_APP_API_URL
        value: "/api" # Use relative path for monolith
      - key: RENDER
        value: true
